name = "bethere"
main = "build/worker/shim.mjs"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Static assets — serve the Leptos WASM frontend
# SPA mode: non-API routes fall back to index.html
[assets]
directory = "../frontend-leptos/dist"
not_found_handling = "single-page-application"

# Build configuration for workers-rs (Rust → WASM)
# Manual build instead of worker-build to reduce memory usage.
# Requires: wasm-bindgen CLI matching the crate version (0.2.118)
#
# The shim.mjs is rewritten after wasm-bindgen runs to create a proper
# ES Module entry point. Workers imports WASM as a WebAssembly.Module,
# so we must instantiate it manually before calling __wbg_set_wasm.
[build]
command = """
  mkdir -p build/worker && \
  CARGO_BUILD_JOBS=2 cargo build -p event-checkin-worker --target wasm32-unknown-unknown --release && \
  wasm-bindgen \
    --target bundler \
    --no-typescript \
    --remove-name-section \
    ../target/wasm32-unknown-unknown/release/event_checkin_worker.wasm \
    --out-dir build/worker && \
  cat > build/worker/shim.mjs << 'SHIM'
import * as imports from "./event_checkin_worker_bg.js";
import wasmModule from "./event_checkin_worker_bg.wasm";

const instance = new WebAssembly.Instance(wasmModule, {
  "./event_checkin_worker_bg.js": imports,
});
imports.__wbg_set_wasm(instance.exports);

export default imports;
SHIM
"""

# Environment variables (non-secret config)
[vars]
SERVER_URL = "https://bethere.solana-thailand.workers.dev"
CLAIM_BASE_URL = "https://bethere.solana-thailand.workers.dev/claim"
GOOGLE_SHEET_NAME = "checkin"
GOOGLE_STAFF_SHEET_NAME = "staff"

# Phase 3: Event config (change per event without WASM rebuild)
EVENT_NAME = "Solana x AI Builders: The Road to Mainnet #1 (Bangkok)"
EVENT_TAGLINE = "Deep Dive into Rust, AI Agents, and the Solana Ecosystem"
EVENT_LINK = "https://solana-thailand.github.io/genesis/events/road-to-mainnet-1-bangkok/"
EVENT_START_MS = "1777170600000"
EVENT_END_MS = "1777183200000"

# Secrets (set via `npx wrangler secret put <NAME>`):
# - JWT_SECRET
# - GOOGLE_CLIENT_ID
# - GOOGLE_CLIENT_SECRET
# - GOOGLE_REDIRECT_URI
# - GOOGLE_SERVICE_ACCOUNT_EMAIL
# - GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY
# - GOOGLE_SERVICE_ACCOUNT_TOKEN_URI
# - GOOGLE_SHEET_ID
# - STAFF_EMAILS

# Phase 2 secrets (Solana / Helius NFT minting):
# - HELIUS_RPC_URL          (optional — defaults to https://devnet.helius-rpc.com)
# - HELIUS_API_KEY           (required)
# - NFT_COLLECTION_MINT     (optional — Helius mints to its own tree without a collection)
# - NFT_METADATA_URI        (optional — metadata JSON on Arweave/IPFS)
# - NFT_IMAGE_URL           (optional — NFT badge image URL)

# Phase 4: Quiz KV namespace (Issue 002 — activity-gated claim)
# Create with: npx wrangler kv namespace create QUIZ
# Then paste the returned ID below.
# Preview: npx wrangler kv namespace create QUIZ --preview
[[kv_namespaces]]
binding = "QUIZ"
id = "<QUIZ_KV_NAMESPACE_ID>"
preview_id = "<QUIZ_KV_PREVIEW_NAMESPACE_ID>"
