<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>BeThere - Scan Success</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24}.success-overlay{background:radial-gradient(circle,rgba(34,197,94,0.15) 0%,rgba(34,197,94,0) 70%)}.glass-panel{backdrop-filter:blur(12px);background:rgba(30,30,30,0.8)}</style>
</head><body class="bg-[#13131b] text-[#e4e1ed]">
<header class="bg-[#1a1a1a] border-b border-[#2a2a2a] fixed top-0 w-full z-50 flex justify-between items-center px-6 h-16 backdrop-blur-md"><div class="flex items-center gap-3"><span class="material-symbols-outlined text-[#6366f1]">confirmation_number</span><span class="text-lg font-bold tracking-tighter text-white">BeThere</span></div><div class="h-8 w-8 rounded-full overflow-hidden border border-[#2a2a2a]"></div></header>
<main class="relative h-screen w-full bg-black pt-16 pb-20">
<div class="absolute inset-0 z-0 bg-[#1a1a1a] opacity-60"></div>
<div class="absolute inset-0 flex items-center justify-center z-10"><div class="w-64 h-64 border-2 border-white/20 rounded-xl relative"><div class="absolute -top-1 -left-1 w-6 h-6 border-t-4 border-l-4 border-green-500 rounded-tl-md"></div><div class="absolute -top-1 -right-1 w-6 h-6 border-t-4 border-r-4 border-green-500 rounded-tr-md"></div><div class="absolute -bottom-1 -left-1 w-6 h-6 border-b-4 border-l-4 border-green-500 rounded-bl-md"></div><div class="absolute -bottom-1 -right-1 w-6 h-6 border-b-4 border-r-4 border-green-500 rounded-br-md"></div></div></div>
<div class="absolute inset-0 z-20 success-overlay pointer-events-none"></div>
<div class="absolute bottom-0 left-0 w-full z-40 px-4 pb-8"><div class="glass-panel border border-[#2a2a2a] rounded-xl p-6 shadow-2xl"><div class="flex flex-col items-center text-center"><div class="w-20 h-20 bg-green-500/20 rounded-full flex items-center justify-center mb-4 border border-green-500/50"><span class="material-symbols-outlined text-green-500 text-5xl" style="font-variation-settings:'FILL' 1">check_circle</span></div><div class="space-y-1 mb-6"><h2 class="text-2xl font-extrabold text-white">Sarah Connor</h2><div class="flex items-center justify-center gap-2"><span class="bg-[#2f3aa3] text-[#a8afff] px-3 py-0.5 rounded-full text-[11px] font-bold uppercase tracking-wider">In-Person</span><span class="text-green-400 text-xs flex items-center gap-1"><span class="material-symbols-outlined text-sm">verified</span> Checked in!</span></div></div><div class="w-full grid grid-cols-2 gap-3 mb-8"><div class="bg-[#1a1a1a] border border-[#2a2a2a] p-3 rounded-lg text-left"><p class="text-[#999] text-[10px] font-mono uppercase mb-1">Ticket Type</p><p class="text-sm font-medium text-white">VIP Access</p></div><div class="bg-[#1a1a1a] border border-[#2a2a2a] p-3 rounded-lg text-left"><p class="text-[#999] text-[10px] font-mono uppercase mb-1">On-Chain ID</p><p class="text-sm font-medium text-white truncate">0x71C...3a4f</p></div></div><button class="w-full bg-[#6366f1] hover:bg-[#4f46e5] text-white font-bold py-4 rounded-lg flex items-center justify-center gap-2 transition-all active:scale-95 shadow-lg shadow-indigo-500/20"><span class="material-symbols-outlined">qr_code_scanner</span> Scan Next</button></div></div></div>
</main>
<nav class="bg-[#1a1a1a] border-t border-[#2a2a2a] fixed bottom-0 w-full z-50 flex justify-around items-center h-20 px-4"><a class="flex flex-col items-center justify-center text-[#999] gap-1" href="#"><span class="material-symbols-outlined">grid_view</span><span class="text-[10px] font-semibold uppercase tracking-widest">Dashboard</span></a><a class="flex flex-col items-center justify-center text-[#6366f1] gap-1" href="#"><span class="material-symbols-outlined">qr_code_scanner</span><span class="text-[10px] font-semibold uppercase tracking-widest">Scanner</span></a><a class="flex flex-col items-center justify-center text-[#999] gap-1" href="#"><span class="material-symbols-outlined">settings</span><span class="text-[10px] font-semibold uppercase tracking-widest">Settings</span></a></nav>
</body></html>
