<div class="w-full bg-[#1f1f27] border border-[#2a2a2a] rounded-xl p-4 mb-10 flex flex-col gap-2"><div class="flex justify-between items-center"><span class="text-xs text-[#908fa0] uppercase tracking-widest">Asset ID</span><span class="text-xs text-green-500 flex items-center gap-1"><span class="w-1.5 h-1.5 rounded-full bg-green-500"></span> On-Chain</span></div><div class="flex items-center justify-between bg-[#1b1b23] border border-[#2a2a2a] rounded-lg px-4 py-2"><code class="text-xs text-[#e4e1ed] tracking-tight">BxRW...3KjF</code><button class="text-[#c0c1ff] hover:text-[#8083ff] active:scale-95 transition-all"><span class="material-symbols-outlined text-lg">content_copy</span></button></div></div>
<div class="w-full flex flex-col gap-4"><button class="w-full bg-[#6366f1] text-white font-bold text-base py-4 rounded-xl active:scale-95 transition-all flex items-center justify-center gap-2 shadow-lg shadow-[#c0c1ff]/20"><span class="material-symbols-outlined">share</span> Share your NFT</button><a class="text-[#908fa0] hover:text-white text-xs flex items-center justify-center gap-1 transition-colors" href="#">View on Explorer <span class="material-symbols-outlined text-sm">open_in_new</span></a></div>
</div>
