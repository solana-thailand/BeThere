# ============================================
# Event QR Check-In System — Docker Compose
# ============================================
#
# Usage:
#   docker compose up -d          # Start in background
#   docker compose logs -f        # Follow logs
#   docker compose down           # Stop
#   docker compose up --build     # Rebuild and start
#
# Configuration:
#   Copy .env.example to .env and fill in real values before starting.
#   The .env file is automatically loaded by docker compose.

services:
  event-checkin:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: event-checkin
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    env_file:
      - .env
    environment:
      # Override defaults for container environment
      - HOST=0.0.0.0
      - RUST_LOG=event_checkin=info,tower_http=warn
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-3000}/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 64M
          cpus: "0.1"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
