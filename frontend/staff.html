<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Staff Check-In</title>
        <link rel="stylesheet" href="/css/style.css" />
    </head>
    <body>
        <!-- Header -->
        <div class="header">
            <div class="header-inner">
                <span class="header-title">&#127915; Event Check-In</span>
                <div style="display: flex; align-items: center; gap: 0.5rem">
                    <span class="header-user" id="userEmail"></span>
                    <button class="btn btn-outline btn-sm" onclick="logout()">
                        Sign Out
                    </button>
                </div>
            </div>
        </div>

        <div class="page-container">
            <!-- Check-In Mode Toggle -->
            <div
                class="mode-toggle"
                style="
                    display: flex;
                    align-items: center;
                    justify-content: space-between;
                    margin-bottom: 0.75rem;
                    padding: 0.5rem 0.75rem;
                    background: var(--bg-secondary);
                    border: 1px solid var(--border);
                    border-radius: var(--radius-sm);
                "
            >
                <span
                    style="
                        font-size: 0.85rem;
                        font-weight: 600;
                        color: var(--text-primary);
                    "
                    >&#9881; Check-In Mode</span
                >
                <div style="display: flex; gap: 0.25rem">
                    <button
                        class="btn btn-sm mode-btn active"
                        id="modePreviewBtn"
                        onclick="setCheckInMode('preview')"
                    >
                        &#128065; Preview
                    </button>
                    <button
                        class="btn btn-sm mode-btn"
                        id="modeInstantBtn"
                        onclick="setCheckInMode('instant')"
                    >
                        &#9889; Instant
                    </button>
                </div>
            </div>

            <!-- Tabs -->
            <div class="tabs">
                <button
                    class="tab active"
                    data-tab="scanner"
                    onclick="switchTab('scanner')"
                >
                    &#128247; Scanner
                </button>
                <button
                    class="tab"
                    data-tab="manual"
                    onclick="switchTab('manual')"
                >
                    &#9997; Manual
                </button>
            </div>

            <!-- Scanner Tab -->
            <div id="panel-scanner" class="tab-panel">
                <div id="scannerArea">
                    <div class="scanner-area">
                        <div
                            id="scannerVideo"
                            style="width: 100%; height: 100%"
                        ></div>
                        <div class="scanner-overlay">
                            <div class="scanner-frame">
                                <div class="scanner-line"></div>
                            </div>
                        </div>
                    </div>

                    <div
                        class="scanner-placeholder hidden"
                        id="scannerPlaceholder"
                    >
                        <div class="icon">&#128247;</div>
                        <p>Camera scanner ready</p>
                    </div>

                    <div style="text-align: center; margin-top: 1rem">
                        <button class="btn btn-primary" id="startScanBtn">
                            &#128247; Start Scanner
                        </button>
                        <button class="btn btn-danger hidden" id="stopScanBtn">
                            &#9632; Stop Scanner
                        </button>
                    </div>

                    <div
                        class="loading hidden"
                        id="scannerStatus"
                        style="text-align: center; margin-top: 0.75rem"
                    >
                        <span class="spinner"></span> Scanning...
                    </div>
                </div>
            </div>

            <!-- Manual Tab -->
            <div id="panel-manual" class="tab-panel hidden">
                <div class="card">
                    <h3>&#9997; Manual Check-In</h3>
                    <p
                        style="
                            font-size: 0.85rem;
                            color: var(--text-secondary);
                            margin-bottom: 1rem;
                        "
                    >
                        Enter the attendee ID (e.g. gst-abc123) or paste a QR
                        code URL.
                    </p>
                    <form id="manualForm" class="manual-input-group">
                        <input
                            type="text"
                            id="manualIdInput"
                            placeholder="Enter attendee ID or scan URL..."
                            autocomplete="off"
                            required
                        />
                        <button
                            type="submit"
                            class="btn btn-primary"
                            id="manualSubmitBtn"
                        >
                            Look Up
                        </button>
                    </form>
                </div>
            </div>

            <!-- Loading Panel -->
            <div id="loadingPanel" class="hidden" style="margin-top: 1.5rem">
                <div class="card text-center">
                    <span class="spinner spinner-lg"></span>
                    <p
                        id="loadingText"
                        style="
                            margin-top: 0.75rem;
                            color: var(--text-secondary);
                        "
                    >
                        Loading...
                    </p>
                </div>
            </div>

            <!-- Preview Panel (shown before confirm in preview mode) -->
            <div id="previewPanel" class="hidden" style="margin-top: 1.5rem">
                <div class="card" style="border-color: var(--accent)">
                    <div class="text-center" style="margin-bottom: 0.75rem">
                        <span style="font-size: 2.5rem">&#128100;</span>
                    </div>
                    <h3
                        class="text-center"
                        id="previewName"
                        style="margin-bottom: 0.25rem"
                    >
                        -
                    </h3>
                    <p
                        class="text-center"
                        id="previewEmail"
                        style="
                            color: var(--text-secondary);
                            font-size: 0.85rem;
                            margin-bottom: 0.75rem;
                        "
                    >
                        -
                    </p>
                    <div
                        style="
                            display: grid;
                            grid-template-columns: 1fr 1fr;
                            gap: 0.5rem;
                            font-size: 0.85rem;
                            margin-bottom: 1rem;
                        "
                    >
                        <div>
                            <span style="color: var(--text-muted)">Ticket</span>
                            <p
                                id="previewTicket"
                                style="
                                    color: var(--text-primary);
                                    font-weight: 500;
                                "
                            >
                                -
                            </p>
                        </div>
                        <div>
                            <span style="color: var(--text-muted)"
                                >Participation</span
                            >
                            <p
                                id="previewParticipation"
                                style="font-weight: 500"
                            >
                                -
                            </p>
                        </div>
                        <div>
                            <span style="color: var(--text-muted)">Status</span>
                            <p id="previewStatus" style="font-weight: 500">-</p>
                        </div>
                        <div>
                            <span style="color: var(--text-muted)">ID</span>
                            <p
                                id="previewId"
                                style="
                                    color: var(--text-secondary);
                                    font-size: 0.75rem;
                                    word-break: break-all;
                                "
                            >
                                -
                            </p>
                        </div>
                    </div>
                    <div style="display: flex; gap: 0.5rem">
                        <button
                            class="btn btn-primary"
                            style="flex: 1"
                            id="confirmCheckInBtn"
                            onclick="confirmCheckIn()"
                        >
                            &#10003; Confirm Check-In
                        </button>
                        <button
                            class="btn btn-outline"
                            id="cancelPreviewBtn"
                            onclick="cancelPreview()"
                        >
                            Cancel
                        </button>
                    </div>
                </div>
            </div>

            <!-- Result Panel -->
            <div id="resultPanel" class="hidden" style="margin-top: 1.5rem">
                <div id="resultContainer">
                    <div class="text-center" style="margin-bottom: 0.5rem">
                        <span id="resultIcon" style="font-size: 3rem"></span>
                    </div>
                    <h2 id="resultTitle" class="text-center"></h2>
                    <p
                        id="resultMessage"
                        class="text-center"
                        style="
                            color: var(--text-secondary);
                            margin-top: 0.25rem;
                        "
                    ></p>
                    <div
                        id="resultDetails"
                        class="result-details"
                        style="margin-top: 1rem"
                    ></div>
                </div>
                <div style="text-align: center; margin-top: 1.25rem">
                    <button
                        class="btn btn-primary"
                        id="newScanBtn"
                        onclick="resetScanner()"
                    >
                        &#128260; Scan Next
                    </button>
                    <button
                        class="btn btn-outline"
                        onclick="switchTab('manual')"
                        style="margin-left: 0.5rem"
                    >
                        &#9997; Manual Entry
                    </button>
                </div>
            </div>
        </div>

        <!-- html5-qrcode library -->
        <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

        <!-- App scripts -->
        <script src="/js/app.js"></script>
        <script src="/js/scanner.js"></script>

        <style>
            .mode-btn {
                background: var(--bg-tertiary);
                color: var(--text-secondary);
                border: 1px solid transparent;
            }
            .mode-btn:hover {
                color: var(--text-primary);
                background: var(--bg-hover);
            }
            .mode-btn.active {
                background: var(--accent);
                color: #fff;
                border-color: var(--accent);
            }
        </style>

        <script>
            // Check-in mode: "preview" (show info first) or "instant" (check in immediately)
            var checkInMode = "preview";

            function setCheckInMode(mode) {
                checkInMode = mode;
                var previewBtn = document.getElementById("modePreviewBtn");
                var instantBtn = document.getElementById("modeInstantBtn");
                if (previewBtn)
                    previewBtn.classList.toggle("active", mode === "preview");
                if (instantBtn)
                    instantBtn.classList.toggle("active", mode === "instant");

                // Update submit button text based on mode
                var submitBtn = document.getElementById("manualSubmitBtn");
                if (submitBtn) {
                    submitBtn.innerHTML =
                        mode === "preview"
                            ? "&#128269; Look Up"
                            : "&#9889; Check In";
                }
            }

            // Tab switching for scanner page
            function switchTab(tabName) {
                // Update tab buttons
                document.querySelectorAll(".tab").forEach(function (tab) {
                    tab.classList.toggle("active", tab.dataset.tab === tabName);
                });

                // Update tab panels
                document
                    .querySelectorAll(".tab-panel")
                    .forEach(function (panel) {
                        panel.classList.toggle(
                            "hidden",
                            panel.id !== "panel-" + tabName,
                        );
                    });

                // Stop scanner when switching away from scanner tab
                if (
                    tabName !== "scanner" &&
                    typeof isScanning !== "undefined" &&
                    isScanning
                ) {
                    stopScanning();
                }

                // Focus manual input when switching to manual tab
                if (tabName === "manual") {
                    var input = document.getElementById("manualIdInput");
                    if (input) {
                        setTimeout(function () {
                            input.focus();
                        }, 100);
                    }
                }
            }
        </script>
    </body>
</html>
